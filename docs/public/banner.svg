<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D0D1C;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="380" height="120" fill="#0D0D1C" rx="18"/>
  <rect width="380" height="120" fill="url(#bgGlow)" rx="18"/>

  <!-- ICON -->
  <g transform="translate(10, 0)">
    <rect x="24" y="14" width="50" height="64" rx="5"
          fill="none" stroke="url(#iconGrad)" stroke-width="1.8" opacity="0.75"/>
    <polygon points="60,14 74,14 74,28 60,14" fill="#0D0D1C"/>
    <polyline points="60,14 60,28 74,28"
              fill="none" stroke="url(#iconGrad)" stroke-width="1.8" opacity="0.75"
              stroke-linejoin="round"/>
    <line x1="32" y1="44" x2="66" y2="44" stroke="#60A5FA" stroke-width="1.3" opacity="0.3"/>
    <line x1="32" y1="52" x2="66" y2="52" stroke="#60A5FA" stroke-width="1.3" opacity="0.3"/>
    <line x1="32" y1="60" x2="54" y2="60" stroke="#60A5FA" stroke-width="1.3" opacity="0.3"/>
    <circle cx="44" cy="44" r="2" fill="#60A5FA" opacity="0.5"/>
    <circle cx="55" cy="52" r="2" fill="#A78BFA" opacity="0.5"/>
    <circle cx="73" cy="82" r="14" fill="#0D0D1C"
            stroke="url(#glowGrad)" stroke-width="2" filter="url(#glow)"/>
    <line x1="83" y1="92" x2="93" y2="103"
          stroke="url(#glowGrad)" stroke-width="3"
          stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="73" cy="82" r="3.5" fill="url(#glowGrad)" filter="url(#softGlow)"/>
    <circle cx="67" cy="78" r="1.5" fill="#60A5FA" opacity="0.6"/>
    <circle cx="79" cy="78" r="1.5" fill="#A78BFA" opacity="0.6"/>
    <circle cx="73" cy="88" r="1.5" fill="#60A5FA" opacity="0.6"/>
    <line x1="67" y1="78" x2="73" y2="82" stroke="#60A5FA" stroke-width="0.8" opacity="0.4"/>
    <line x1="79" y1="78" x2="73" y2="82" stroke="#A78BFA" stroke-width="0.8" opacity="0.4"/>
    <line x1="73" y1="88" x2="73" y2="82" stroke="#60A5FA" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Divider -->
  <line x1="120" y1="28" x2="120" y2="92"
        stroke="url(#textGrad)" stroke-width="0.8" opacity="0.2"/>

  <!-- TEXT: docquery tudo junto, gradiente -->
  <text x="136" y="74"
    font-family="'Courier New', Courier, monospace"
    font-size="42" font-weight="700" letter-spacing="-1"
    fill="url(#textGrad)" filter="url(#textGlow)">docquery</text>

  <!-- Underline accent -->
  <line x1="136" y1="83" x2="370" y2="83"
        stroke="url(#textGrad)" stroke-width="0.8" opacity="0.2"/>
</svg>
